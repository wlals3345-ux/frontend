<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>로또 생성기</h1>
    <button class="lotto_btn">로또 생성</button>
    <div class ="box"></div>


    <script>
// titles 배열에 서로 다른 영화 제목 6개를 담는다
        // ratings 배열에 각 영화의 평점 6개를 같은 순서로 담는다 (그중 1개는 null — 개봉 예정작)
        // for문으로 `제목 - 평점` 형태로 6줄을 출력한다 (null이면 삼항연산자로 "개봉 예정" 표시)
        // [...ratings] 복사본을 내림차순 정렬해서 출력한다 (랭킹 테이블 준비)

        const title  = ["도시의 밤", "파랑의 계절", "스텔라 오디세이",
                         "마지막 항해", "여름의 문", "은하수 특급"];
        const ratings = [9.8, 9.5, 9.2, 9.0, 8.7, null]; 

        for(i=0; i<title.length; i++){
            console.log(title[i], ratings[i]);


        }
        title.forEach( 
            //배열이 요소들을 순회하면서 처음부터 끝까지 자동으로 반복해주는 함수(0번부터 끝까지)
            // 배열의 모든 요소를 하나씩 꺼내서 원하는 작업을 수행하는 함수

            //배열이 가지고 있는 요소의 값, 배열이 가지고 있는 요소의 방번호
            (item, idx)=> {
                //`` 백팃 - 변수를 출력, 줄바꿈 출력

                // 삼항연산자 - 제어문을 간단하게 작성
                //조건?참:거짓
                console.log(`${item} - ${ratings[idx]}`)
            }
        )

            // /호이스팅 : 코드를 실행하기 전에 변수와 함수의 선언을 먼저 메모리에 올리는 것
            // 함수의 호이스팅: 함수 자체가 끌어올려짐
            // 변수의 호이스팅: 변수의 선언부가 끌어올려짐 
            run(()=>{});




        // 함수는 그냥 실행 ㄴㄴ 호출해야 실행됨, 근데 이름에 ()를 붙여야함 !!! 
        // --> 이름() 함수에 매개변수를 전달해서 함수를 실행
        // 익명의 함수
        let end = () => {
            console.log("작업이 완료 되었듬");
        }
        end()

        //callback함수
        function run(callback){
            callback();
        }
        // 매개변수에 이름을 넣어주면 초기값이 나온다 (?)


        //함수를 매개변수로 전달하는 방법!!!
        // 1. 익명의 함수로 전달
        run(
            ()=>{
                 console.log("작업 끝");
            }
        )    
        

        // 2. 변수로 전달
        run(end);


       
        
        




        // 로또를 만들고 출력하는 기능
        function make_lotto(){
             /*
        로또 만들기
        1. 무작위수 추출
            Math.random() : 0 ~ 1 사이의 무작위 수를 추출
            범위를 잡아준다 (*범위 + 1)
        2. 배열에 저장할 경우 중복이 발생하는 문제가 있음
        3. Set : 중복 허용 하지 않음!!
        4. 6개의 임의의 수를 추출해서 저장하고 출력하세요 
        */

        let lotto = new Set();
        // lotto.size : 요소의 갯수
        // while ( 조건 ) : 조건이 참이면 실행
        // lotto.size < 6
        while(true){
            // 형 변황 paraseInt : 정수부분만 추출
            let num = parseInt(Math.random() * 47 + 1)
            lotto.add(num);
            // break를 이용해서 탈출
            
            if(lotto.size == 6){
                break;
            }
            
        }

        // 로또번호를 화면에 출력
        console.log("box", document.querySelector(".box"));

        // querySelector : 선택자를 이용해서 화면에 있는 요소를 1개 선택
        let box = document.querySelector(".box");

        // 여러개 선택
        // let box = document.querySelectorall(".box");

        lotto.forEach(
            (item, idx)=>{
                console.log(item);
                box.innerHTML += item + " ";
            }
        );
            //반복문의 끝나면 줄바꿈
            box.innerHTML += "<br>";
            
    }        
    </script>
       



</body>
</html>
