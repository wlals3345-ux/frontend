<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // 객체 : 데이터와 기능의 집합 
        // {키: "값"}
        // 문자열인 경우 키는 그냥 작성, 값은 문자열 처리
        let movie = {
            tittle : "singstreet",
            genre : "drama",
            rating : "9.5",
            play : function(){
                console.log(this.tittle + "재생");
            }
        }
        // 객체의 속성을 호출
        // 1. 이름 . 으로 접근 --> movie.tittle, movie.gener 등
        // 2. ['속성명']으로 접근 : 속성명을 모르는 경우, 속성명에 띄어쓰기가 있는 경우 --> movie[tittle]

        // for in : 객체인 경우 객체가 가지고 있는 속성의 키값을 꺼내옵니다
        for (key in movie){
            console.log(key); // 키출력
            console.log(movie[key]); // 값 출력

        }

        // let movie str = JSON,Stringify(movie) JSON형식의 문자열로 변환
        // let obj = JSON,parse(movie_str) JSON형식의 문자열로 JS object로 변환
    </script>
</body>
</html>
