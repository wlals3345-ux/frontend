<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
  /* 
  css 전역변수를 등록 
  --변수명 : 값
  */
  :root {
    --box-color    : skyblue; /* 전역 변수 */

    --primary-color: #ff6347;
    --spacing-unit: 8px;
    --font-main: 'Space Grotesk', sans-serif;;

    --space-0: 0;
    --space-1: 4px;
    --space-2: 8px;
    --space-3: 12px;
    --space-4: 16px;
    --space-5: 24px;
    --space-6: 32px;
    --space-7: 48px;
    --bg-color: #ffffff;
    --text-color: #1a1a1a;
  }

  /* 속성을 이용해서 요소를 선택 */
  [data-theme="dark"] {
    --bg-color: #1a1a1a;
    --text-color: #f5f5f5;
  }

  body {
    background-color: var(--bg-color);
    color: var(--text-color);
    transition: background-color 0.3s, color 0.3s;
  }

  /* 수정할 경우 자식요소들에서만 변경사항이 유지됨 */
  .card {
    --box-color: tomato; /* .card 내부에서만 재정의(지역 변수) */
  }

  /* 마진/패딩 변수로 사용하는 방법 */
  .m-0{
    margin: var(--space-0);
  }
  .ml-6{margin-left: var(--space-6);}
  /* 
  변수 사용
  var(--변수명) 
  */
  .box {
    font-family: var(--font-main);
    background-color: var(--box-color);
  }
  </style>
</head>
<body class="m-0 ml-6" data-theme="dark">

<div class="box">하늘색 배경</div>

<div class="card">
  <div class="box">토마토색 배경</div>
</div>
  
</body>
</html>
