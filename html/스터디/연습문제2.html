<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  
<!-- 하단 스타일 태그를 채워 문제를 풀어주시면 됩니다.-->
  <style>
    *{
      box-sizing: border-box;
    }
    .wrap{
      width: 1200px;
      /* display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center; */
      margin: 0 auto;
    }
  
      /* margin-right: auto; */
     

    .header{
      /* border: 1px solid black; */
      display: flex;
      flex-direction: column;
    
    }
    .header-top{
       border: 1px solid black;
       display: flex;
       width: 100%;
       height: 150px;
       margin-bottom: 10px;
      }
    #header-top1{
      width: 20%;
      border: 1px solid black;  
    }
    #header-top2{
      width: 60%;
      border: 1px solid black;
    }
    #header-top3{
      width: 20%;
      border: 1px solid black;
    }

    .nav{
      border: 1px solid black;
      
      
    }
    #menu{
      display: flex;
      justify-content: center;
      gap: 14%;  

    }
    .content{
      border: 1px solid black;
      height: 500px;
      margin-top: 10px;
      display: flex;
      margin-bottom: 10px;
      
    }
    #content1{
      border: 1px solid black;
      width: 30%;
    }

    #content2{
      border: 1px solid black;
      width: 40%;
    }

    #content3{
      border: 1px solid black;
      width: 30%;
    }
    .footer{
      border: 1px solid black;
      height: 100px;
      margin-top: 10px;

    }
    #footer1{
      border: 1px solid black;
      height: 70%;
    }

     #footer2{
      height: 30%;
    }
  </style>
</head>

<body>
  
  <div class="wrap">


    <header class="header">
     <div>
      <div class="header-top">
        <div id="header-top1"></div>
        <div id="header-top2"></div>
        <div id="header-top3"></div>
      </div>

      <nav class="nav">
        <ul id="menu">
          <li>Java</li>
          <li>Oracle</li>
          <li>HTML</li>
          <li>CSS</li>
          <li>JavaScript</li>
        </ul>
      </nav>
     </div>
    </header>
    <section class="content">
     <div>
      <div id="content1"></div>
      <div id="content2"></div>
      <div id="content3"></div>
    </section>
    <footer class="footer">
      <div id="footer1"></div>
      <div id="footer2"></div>
     </div>
    </footer>
  </div>

</body>

</html>
