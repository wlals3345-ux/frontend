<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .table{
            border: 1px solid black;
            width:1200px;
            width:100%;
        }
        
        tr{
            border: 1px solid black;
            width: 100%;
        }
        td{
            border: 1px solid black;
            
        }
    </style>
</head>
<body>
    <table class="table">
     <tr>
        <td>1</td>
        <td>2</td>
        <td>3</td>
        <td>4</td>
     </tr>
     <tr>
        <td>1</td>
        <td colspan="2">2</td>
        
        <td>4</td>
     </tr>
     <tr>
        <td colspan="2">1</td>
        
        <td colspan="2">3</td>
        
     </tr>
     <tr>
        <td colspan="4">1</td>
        
     </tr>
     <tr>
        <td>1</td>
        
        <td colspan="2">3</td>
        <td>4</td>
     </tr>




    </table>
</body>
</html>
