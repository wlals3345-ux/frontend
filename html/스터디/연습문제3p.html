
    <!DOCTYPE html>
    <html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <style>
    .wrap>* {
      box-sizing: border-box;
      margin-top: 10px;
    }

    .wrap {
      width: 100%;
      max-width: 1200px;
      margin: auto;
      display: flex;
      flex-direction: column;
    }
    .header{
       display: flex;
       flex-direction: column;
    }
    .header-top {
      height: 150px;
      display: flex;
      flex-direction: row;
      width: 100%;
    }

    .header-top>* {
      border: 1px solid black;
    }

    #header-top1,
    #header-top3 {
      width: 20%;
    }

    #header-top2 {
      width: 60%;
    }

    .nav {
      border: 1px solid black;
      margin-top: 10px;
      height: 40px;
    }

    #menu{
      margin: 0;
      padding: 0;
      line-height: 40px;
      display: flex;
      justify-content: space-evenly;
    }
    #menu > li {
      font-size: 14px;
    }
    
    .content {
      height: 500px;
      display: flex;
      flex-direction: row;
    }
    .content > * {
      border: 1px solid black;
    }
    #content1,#content3 {
      width: 30%;
    }
    #content2 {
      width: 40%;
    }

    .footer {
      height: 100px;
      display: flex;
      flex-direction: column;
    }
    .footer > * {
      border: 1px solid black;
    }
    #footer1 {
      height: 70%;
    }
    #footer2 {
      height: 30%;
    }
  </style>
</head>

<body>
  
  <div class="wrap">


    <header class="header">

      <div class="header-top">
        <div id="header-top1"></div>
        <div id="header-top2"></div>
        <div id="header-top3"></div>
      </div>

      <nav class="nav">
        <ul id="menu">
          <li>Java</li>
          <li>Oracle</li>
          <li>HTML</li>
          <li>CSS</li>
          <li>JavaScript</li>
        </ul>
      </nav>
    </header>
    <section class="content">
      <div id="content1"></div>
      <div id="content2"></div>
      <div id="content3"></div>
    </section>
    <footer class="footer">
      <div id="footer1"></div>
      <div id="footer2"></div>
    </footer>
  </div>

</body>

</html>
</body>
</html>
