<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=
    , initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
        선택자를 이용해서 요소를 선택하고 중괄호 안에 스타일을 정의 한다.
        선택자 : 요소를 선택
                #아이디
        선택자 {
                속성 : 값
                속성 : 값
                width : 30px;
                height : 20px;}
        */
        #number {
            width: 30px;
            height: 20px;
        } 

        label{
        display : inline-block;
        width: 100px;
        }
    </style>
        
</head>
<body>
    <h1>입력양식</h1>
    <!--
        form : 서버에 데이터를 전달하기 위해 사용

        action : 
        method
        name
    -->
    <form action="loginAction.html" method=post" 
        name="loginform" tafget="eslf">
        id : <input type="text" name="id" minlength="4" maxlength="12"><br>
        아이디는 4자이상 12자 이하로 작성 가능합니다.<br>    
        pw : <input type="password" name="pw" required><br>
        <!-- 버튼의 종류-->
        <input type="button" value="로그인">

        <!-- form태그의 action속성을 서버에 요청
            method속성에 정의된 방식으로 
            (만약 지정하지 않았다면 기본값인 get방식)

            http://127.0.0.1:5500/html/loginAction.html?id=sdf&pw=1234


        -->
        <input type="submit" value="서브밋">
        <input type="reset" value="리셋">

    


    </form>

    <hr>
    <h1>입력양식의 종류</h1>
    <form action="loginAction.html">

        <fieldset>
            <legend>텍스트 입력양식</legend>

             
            <!--
            label - 폼 요소에 이름을 붙일 때 사용
            for속성을 이용해서 요소와 연결
            for = '요소의 아이디'

            레이블을 선택하면 입력요소의 커서가 들어간다.
            -->
            <label for="test">text</label>
            <input id="test" placeholder="아이디를 입력해주세요"><br>

           
            <label for="test1">password</label>
            <input type="password" placeholder="비밀번호를 입력해주세요" id="test1"><br>

            <label for="test2">search</label>
            <input type="search" placeholder="뭘봐" name="" id="test2"><br>
            <!-- 문자가 있는지 체크-->
            <label for="test3">url</label>
            <input type="url"  name="" id="test3"><br>

             <label for="test4">email</label>
            <input type="email" name="" placeholder="이메일을 입력해주세요" id="test4"><br>
        </fieldset>

        
        <fieldset>
            <legend>체크박스/라디오버튼</legend>
            checkbox - 취미
            <br>
            <input type="checkbox" name="hobby" value="1" id="">축구
            <input type="checkbox" name="hobby" value="2" id="">농구
            <input type="checkbox" name="hobby" value="3" id="">배구
            <input type="checkbox" name="hobby" value="4" id="">야구
            <input type="checkbox" name="hobby" value="5" id="">하키
            <input type="checkbox" name="hobby" value="6" id="">테니스
            <br>
            radio - 성별
            <br>
            <input type="radio" name="gender" value="1" id="">남
            <input type="radio" name="gender" value="2" id="">여
            <input type="radio" name="gender" value="3" id="">비밀
            <br>
            number <input type="number" name="" id="number" max="100"
                             min="1" step="10" > 


        </fieldset>

    
        <hr>
        <input type="submit" value="회원가입">


    </form>







</body>
</html>
