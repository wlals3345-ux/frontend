<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        *{
        box-sizing: border-box;
        margin: 0px;

        }
        header{
            width: 100%;
            height: 200px;
            background-color: rgb(188, 230, 188);
        }

        main{
            width:100%;
            /* vh : 창이 높이, ww: 창의 너비 */
            height: 800px;
            background-color: papayawhip

        }
        footer{
            width: 100%;
            height: 200px;
            background-color: rgb(188, 230, 188);
        }
        
        .container{
            width: 80%;
            margin: 0 auto;
        }

        .banner{
            height:70px;
            line-height: 70px;
            background-color: #cada82;
            color:  rgb(76, 78, 70);
            font-weight: 600;
            text-align: center;
            font-size: 1.5em;
            

        }
        .flexbox{
                display: flex;
                justify-content: end;   
                padding: 20px 20px;
                
            
        }
        .quickmenu_item{
                    
                    width: 100px;
        }
        ul{
            list-style: none;

        }


        a{
            text-decoration: none;



        }
        logo_item{
            text-align: right;


        }
    </style>


</head>
<body>
    

<div class="container">
        <!--헤더 : 로고 퀵메뉴 메뉴-->
        <header>
            <div class="banner">JOIN & ENJOY KRW 10,000 OFF YOUR FIRST ORDER !</div>
            <div class="top_quickmenu flexbox">
                
                    <a href="">My</a>
                    <a href="">Login</a>
                    <a href="">Join</a>
                    <a href="">Cart</a>
                
            </div>        
                    
            <div class="top_quickmenu">
                <UL class="flexbox">
                    <li class="quickmenu_item">shop</li>
                    <li class="quickmenu_item">collection</li>
                    <li class="quickmenu_item">aboout</li>
                    <li class="quickmenu_item">board</li>
                </UL>
                
                
            </div>
                    
               



            </div>

            <div class="logo">
                <div class="logo_item">
                    <i class="bi bi-globe"></i>
                    <i class="bi bi-card-heading"></i>
                </div>


            </div>
        </header>
        <!--메인 : 서비스 되는 컨텐츠-->
        <main></main>
        <!--footer-->
        <footer></footer>

 </div>




</body>
</html>
