<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/css/basic.css">
    <script>
        try{
            // 예외(오류)가 발생할 소지가 있는 코드는 try-catch로 묶어 준다!
            // 예외가 발생하면 catch 문장으로 이동함
            let box = document.querySelector('.box')
            box.innerHTML='환영함'
        } catch(e) {
            console.log(e)
        }
        // 외부 데이터 받아오기
        // 1. 요청 URL -> 응답데이터 받기 -> json 형식의 문자열을 오브젝트로 변환
        // fetch('http://api.koreafilm.or.kr/openapi-data2/wisenut/search_api/search_json2.jsp?collection=kmdb_new2&detail=Y&actor=%ED%95%9C%EC%A7%80%EB%AF%BC&ServiceKey=11M1LX721SFQ42K7AQ6R')
        // .then(res=>res.json()) // 응답 결과를 문자열에서 오브젝트로 변환
        // .then(res=>{
        //     console.log(res);

        // })

        
        // 1장의 카드를 만들어서 반환
        function make_card(movie){

            console.log("posters", movie.posters);
            // split : 문자열을 잘라서 배열로 반환하는 함수
            let poster = movie.posters.split('|')[0]
            // 포스터 이미지가 없으면 noimage로 대체
            console.log(poster);
            // 삼항연산자
            //참 일 때는 poster가 반환, 거짓일 때는 noimg 반환
            poster = poster?poster: "img/noimage.png";        
            // 매개변수로 전달된 객체를 로그로 남겨 확인
            //  console.log(movie);
            // 객체가 가지고 있는 내용을 확인 (키로 접근) - 많이 사용하는 방법
            // console.log(movie.title);
            // 속성이름을 []를 이용해서 접근하는 경우 []안에 문자열을 홑따옴표로 감싼다
            // 키값을 모르는 경우, 키값에 공백이 있는 경우
            // console.log(movie['rating']);
            // console.log(movie.genre);
            // console.log(movie.img);
            
            return `<a href="http://naver.com"><article class="card rounded-lg overflow-hidden flex-2" data-rating="${movie.rating}">
              <img class="w-100 h-300px object-cover" src="${poster}" alt="스텔라 오디세이 포스터">
              <div class="card-body bg-white px-3 py-5 fs-lg">
                <h3>${movie.title}</h3>
                <p class="genre text-gray mb-">${movie.genre}</p>
                <span class="badge">NEW</span>
              </div>
            </article></a>`;
    }

    // 1. 화면이 로드 된 이후 실행 -> 요소가 없으면 오류 발생
    window.addEventListener('load', () =>{
        console.log('load 이벤트 발생')
        
        // 초기화 함수 : 데이터를 받아서 화면을 초기화
        // 데이터를 받아서 요소를 생성함
        init()
    })

    function init(){
        console.log('init() 함수가 호출 되었습니다')
        // 서버로 부터 데이터를 받아옴
        // 네트워크 통신은 시간이 오래 걸릴 수 있다
        let grid = document.querySelector('.grid')
        fetch('http://api.koreafilm.or.kr/openapi-data2/wisenut/search_api/search_json2.jsp?collection=kmdb_new2&detail=Y&actor=%ED%95%9C%EC%A7%80%EB%AF%BC&ServiceKey=11M1LX721SFQ42K7AQ6R')
        // fetch('json/movies.json')
        .then(res=>res.json())
        .then(res=>{

            console.log(res);

            // 데이터를 이용해서 화면을 구현
            // res : 영화목록 배열 
            res.Data[0].Result.forEach(item => {
                // item : 배열의 요소를 하나씩 꺼내서 item에 넣고 함수를 실행
                // 배열이 끝날 때 까지
                grid.innerHTML += make_card(item)
            });
        })        

        .catch((e)=>{
          console.log(e)
          console.log('fetch 요청 실패!!!!')
        })
    }

    </script>
</head>
<body class="'be-light">
    <div class="box"></div>

    <section class="d-flex flex-col items-center bg-white pb-5">
    <h1 class="pb-2 pt-5">이번 주, 어떤 영화 볼까요?</h1>
    <p class="text-gray fw-medium pb-5">큐레이션된 컬렉션에서 다음 영화를 찾아보세요.</p>
    <form class="search-form">
      <input class="border-left-2" type="text"  name="keyword" placeholder="영화 제목 검색" required>
      <select class="bu" name="genre">
        <option value="all">전체 장르</option>
        <option value="action">액션</option>
        <option value="romance">로맨스</option>
        <option value="scifi">SF</option>
      </select>
      <button type="submit">검색</button>
    </form>
  </section>

  <section class="movie-list max-w-lg  mt-7 m-auto">
    <h2 class="border-left-2 my-2 pl-4">이번 달 추천작</h2>
    <div class="grid d-flex flex-wrap gap-5 ml-4">


    </div>
  </section>
</body>
</html>
