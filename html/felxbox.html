<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>플렉스 박스</title>
    <style>
        .container{
            /* 축을 기준으로 배치 */
            display: flex;
            /* 축을 지정
                기본값 : row 
            */
            /* flex-directtion: space-around; */

            /* 주축의 정렬 */
            /* justify-content: center; */
            /* 교차 축의 정렬 */
            align-items: space-around;
            border: 1px solid violet;
            /* 플렉스 박스의 기본값을 한줄로 표현하는 곳 */
            /* 요소를 여러줄에 표현 */
            flex-flow: wrap;
            

        }

        .box{
            display: flex;
            border: 1px solid brown;
            width: 400px;
            height: 200px;
        
        }

        .box_img{
            width: 30%;
            height: 100%;
            text-align: center;
            background-color: palevioletred;
        }
        .box_text{
            width: 70%;
            height: 100%;
            background-color: rgb(233, 233, 138);
        }
        .box_img img{
            width: 100%;
            border-radius: 50%;
            
        }
    </style>
</head>
<body>
    
    <div class="container">
        <div class="box">1
            <div class="box_img">
                <img src="/html/img/mic.jpg" alt="마이크">
            </div>
            <div class="box_text">
                <p></p>
                <p></p>

            </div>
        </div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
    </div>



</body>
</html>
